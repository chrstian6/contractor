<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 16 16" shape-rendering="crispEdges" role="img" aria-label="Pixel-art yellow construction hard hat">
  <!-- transparent background; 16x16 pixel grid -->
  <!-- Palette:
       outline  #1a1a1a
       hi       #ffe14d  (highlight yellow)
       mid      #ffcc00  (main yellow)
       low      #e0a800  (shadow yellow) -->
  <g>
    <!-- Top ridge / crown outline -->
    <rect x="6" y="2" width="4" height="1" fill="#1a1a1a"/>

    <!-- Row 3: crown top -->
    <rect x="5" y="3" width="1" height="1" fill="#1a1a1a"/>
    <rect x="6" y="3" width="2" height="1" fill="#ffe14d"/>
    <rect x="8" y="3" width="2" height="1" fill="#ffcc00"/>
    <rect x="10" y="3" width="1" height="1" fill="#1a1a1a"/>

    <!-- Row 4 -->
    <rect x="4" y="4" width="1" height="1" fill="#1a1a1a"/>
    <rect x="5" y="4" width="2" height="1" fill="#ffe14d"/>
    <rect x="7" y="4" width="1" height="1" fill="#ffcc00"/>
    <rect x="8" y="4" width="1" height="1" fill="#1a1a1a"/>
    <rect x="9" y="4" width="2" height="1" fill="#ffcc00"/>
    <rect x="11" y="4" width="1" height="1" fill="#1a1a1a"/>

    <!-- Row 5 (dome sides + center ridge) -->
    <rect x="3" y="5" width="1" height="1" fill="#1a1a1a"/>
    <rect x="4" y="5" width="2" height="1" fill="#ffe14d"/>
    <rect x="6" y="5" width="1" height="1" fill="#ffcc00"/>
    <rect x="7" y="5" width="1" height="1" fill="#1a1a1a"/>
    <rect x="8" y="5" width="3" height="1" fill="#ffcc00"/>
    <rect x="11" y="5" width="1" height="1" fill="#e0a800"/>
    <rect x="12" y="5" width="1" height="1" fill="#1a1a1a"/>

    <!-- Row 6 (dome sides + center ridge) -->
    <rect x="3" y="6" width="1" height="1" fill="#1a1a1a"/>
    <rect x="4" y="6" width="2" height="1" fill="#ffe14d"/>
    <rect x="6" y="6" width="1" height="1" fill="#ffcc00"/>
    <rect x="7" y="6" width="1" height="1" fill="#1a1a1a"/>
    <rect x="8" y="6" width="3" height="1" fill="#ffcc00"/>
    <rect x="11" y="6" width="1" height="1" fill="#e0a800"/>
    <rect x="12" y="6" width="1" height="1" fill="#1a1a1a"/>

    <!-- Row 7 (bottom of dome) -->
    <rect x="3" y="7" width="1" height="1" fill="#1a1a1a"/>
    <rect x="4" y="7" width="3" height="1" fill="#ffcc00"/>
    <rect x="7" y="7" width="1" height="1" fill="#1a1a1a"/>
    <rect x="8" y="7" width="3" height="1" fill="#e0a800"/>
    <rect x="11" y="7" width="1" height="1" fill="#e0a800"/>
    <rect x="12" y="7" width="1" height="1" fill="#1a1a1a"/>

    <!-- Row 8: brim top edge (full width) -->
    <rect x="1" y="8" width="1" height="1" fill="#1a1a1a"/>
    <rect x="2" y="8" width="12" height="1" fill="#ffcc00"/>
    <rect x="14" y="8" width="1" height="1" fill="#1a1a1a"/>

    <!-- Row 9: brim body -->
    <rect x="1" y="9" width="1" height="1" fill="#1a1a1a"/>
    <rect x="2" y="9" width="3" height="1" fill="#ffe14d"/>
    <rect x="5" y="9" width="9" height="1" fill="#e0a800"/>
    <rect x="14" y="9" width="1" height="1" fill="#1a1a1a"/>

    <!-- Row 10: brim bottom outline -->
    <rect x="2" y="10" width="12" height="1" fill="#1a1a1a"/>
  </g>
</svg>
